name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Run Unit Tests
      run: ./gradlew testDebugUnitTest

  instrumented-tests:
    name: Instrumented Tests (API ${{ matrix.api-level }}${{ matrix.suffix && format(' {0}', matrix.suffix) || '' }})
    runs-on: ubuntu-latest
    # 37.x preview legs run non-blocking (matrix.experimental); the rest gate.
    continue-on-error: ${{ matrix.experimental || false }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # minSdk 30 / target 35: google_apis legs across the supported range.
          - api-level: '30'
            target: google_apis
            ram-size: 2048M
            memory: 2048
            gpu: swiftshader_indirect
          - api-level: '33'
            target: google_apis
            ram-size: 2048M
            memory: 2048
            gpu: swiftshader_indirect
          - api-level: '36'
            target: google_apis
            ram-size: 2048M
            memory: 2048
            gpu: auto
          # API 37.x ps16k legs. channel selects the emulator (and image
          # revision) via sdkmanager --channel.
          - api-level: '37.0'
            suffix: 'stable-lavapipe'
            target: google_apis_ps16k
            ram-size: 4096M
            memory: 4096
            gpu: lavapipe
            cores: 4
            experimental: true
          - api-level: '37.0'
            suffix: 'canary-lavapipe'
            target: google_apis_ps16k
            channel: canary
            ram-size: 4096M
            memory: 4096
            gpu: lavapipe
            cores: 4
            experimental: true
          - api-level: '37.0'
            suffix: 'canary-auto'
            target: google_apis_ps16k
            channel: canary
            ram-size: 4096M
            memory: 4096
            gpu: auto
            cores: 4
            experimental: true
          - api-level: '37.1'
            suffix: 'canary-lavapipe'
            target: google_apis_ps16k
            channel: canary
            ram-size: 4096M
            memory: 4096
            gpu: lavapipe
            cores: 4
            experimental: true
          - api-level: '37.1'
            suffix: 'canary-auto'
            target: google_apis_ps16k
            channel: canary
            ram-size: 4096M
            memory: 4096
            gpu: auto
            cores: 4
            experimental: true

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Enable KVM
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    # The runner image ships an outdated avdmanager that writes target=android-0
    # for minor-versioned packages (android-37.x); the emulator clamps that to
    # API 3 and skips the Vulkan/GLDirectMem auto-enable the ps16k images need.
    - name: Update SDK cmdline-tools
      run: |
        SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
        yes | "$SDK/cmdline-tools/latest/bin/sdkmanager" --install "cmdline-tools;latest" > /dev/null
        # sdkmanager won't overwrite the preinstalled dir; it installs to latest-2.
        if [ -d "$SDK/cmdline-tools/latest-2" ]; then
          rm -rf "$SDK/cmdline-tools/latest"
          mv "$SDK/cmdline-tools/latest-2" "$SDK/cmdline-tools/latest"
        fi
        "$SDK/cmdline-tools/latest/bin/avdmanager" list device > /dev/null

    - name: Run instrumented tests
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: ${{ matrix.api-level }}
        arch: x86_64
        target: ${{ matrix.target }}
        channel: ${{ matrix.channel || 'stable' }}
        force-avd-creation: true
        ram-size: ${{ matrix.ram-size }}
        cores: ${{ matrix.cores }}
        disk-size: 8192M
        emulator-boot-timeout: 900
        emulator-options: -no-snapshot -no-window -gpu ${{ matrix.gpu }} -noaudio -no-boot-anim -camera-back none -memory ${{ matrix.memory }} -delay-adb -verbose
        disable-animations: true
        script: |
          echo "===== AVD root ini ====="; cat "$HOME/.android/avd/test.ini" 2>/dev/null || echo "(test.ini not found)"
          ./gradlew connectedDebugAndroidTest

    - name: Upload instrumented test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: instrumented-test-results-api${{ matrix.api-level }}${{ matrix.suffix && format('-{0}', matrix.suffix) || '' }}
        path: app/build/reports/androidTests/
